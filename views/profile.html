<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile</title>
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/cards.css" />
    <link rel="stylesheet" href="/css/responsive.css" />
    <link rel="icon" href="public/images/logo.png" type="image/png">
  </head>
  <body>
    <div class="container">
      <nav>
        <div class="site-brand"><img src="/images/logo.png" alt="Logo" class="brand-logo" /><span>Symposium</span> Profile</div>
        <div class="toggle-menu">☰</div>
        <div class="nav-links">
          <a href="/events">Events</a>
          <a href="/my-registrations">My Registrations</a>
          <button class="btn btn-secondary" data-logout>Logout</button>
        </div>
      </nav>
      <section class="card" style="max-width:700px; margin:auto;">
        <div class="card-header" style="flex-direction:column; align-items:flex-start; gap:0.5rem;">
          <h1>College Profile</h1>
          <p class="text-muted">Keep your coordinator account details safe and up to date.</p>
        </div>
        <div class="form-group">
          <label>College ID</label>
          <input id="profileCollegeId" readonly />
        </div>
        <div class="form-group">
          <label>College Name</label>
          <input id="profileCollegeName" readonly />
        </div>
        <div class="form-group">
          <label>Username</label>
          <input id="profileUsername" readonly />
        </div>
      </section>
    </div>
    <div class="toast-container"></div>
    <script src="/js/app.js"></script>
    <script>
      fetch('/api/auth/profile')
        .then((res) => res.json())
        .then((user) => {
          document.querySelector('#profileCollegeId').value = user.collegeId || 'Admin account';
          document.querySelector('#profileCollegeName').value = user.collegeName || 'N/A';
          document.querySelector('#profileUsername').value = user.username || 'N/A';
        })
        .catch(() => {
          window.location.href = '/login';
        });
    </script>
  </body>
</html>
