<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Symposium Registration</title>
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/forms.css" />
    <link rel="stylesheet" href="/css/responsive.css" />
    <link rel="icon" href="public/images/logo.png" type="image/png">
  </head>
  <body>
    <div class="container" style="min-height:100vh; display:grid; place-items:center;">
      <div class="card" style="max-width:560px; width:100%;">
        <div class="card-header" style="flex-direction:column; align-items:flex-start; gap:0.5rem;">
          <div class="site-brand"><img src="/images/logo.png" alt="Logo" class="brand-logo" /><span>Symposium</span> College Signup</div>
          <p class="text-muted">Register your college coordinator account before applying for events.</p>
        </div>
        <form id="registerForm" novalidate>
          <div class="form-group">
            <label for="collegeName">College Name</label>
            <input id="collegeName" type="text" placeholder="ABC Engineering College" required />
          </div>
          <div class="form-group">
            <label for="regUsername">Username</label>
            <input id="regUsername" type="text" placeholder="Choose a username" required />
          </div>
          <div class="form-group">
            <label for="regPassword">Password</label>
            <input id="regPassword" type="password" placeholder="Create a password" required />
          </div>
          <div class="form-group">
            <label for="confirmPassword">Confirm Password</label>
            <input id="confirmPassword" type="password" placeholder="Confirm your password" required />
          </div>
          <div class="form-footer" style="justify-content:flex-start; align-items:center;">
            <label style="display:flex; align-items:center; gap:0.5rem; font-size:0.94rem; color:var(--muted);">
              <input id="showPassword" type="checkbox" /> Show password
            </label>
          </div>
          <button type="submit" class="btn btn-primary" style="width:100%; margin-top:1rem;">Create Account</button>
          <p class="text-muted" style="margin-top:1rem; text-align:center;">Already registered? <a href="/login" style="color:var(--primary); text-decoration:none;">Sign in</a></p>
        </form>
      </div>
    </div>
    <div class="toast-container"></div>
    <script src="/js/app.js"></script>
    <script src="/js/login.js"></script>
  </body>
</html>
