<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Users Management</title>

<link rel="stylesheet" href="/css/style.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:#fff;
padding:20px;
}

.page-title{
font-size:28px;
margin-bottom:20px;
}

.top-bar{
display:flex;
justify-content:space-between;
align-items:center;
gap:15px;
margin-bottom:20px;
flex-wrap:wrap;
}

.search-box{
flex:1;
min-width:250px;
}

.search-box input{
width:100%;
padding:12px;
border:none;
outline:none;
border-radius:10px;
background:#1e293b;
color:white;
}

.table-container{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
border:1px solid #334155;
border-radius:15px;
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
min-width:900px;
}

thead{
background:#1e293b;
}

th,td{
padding:14px;
text-align:left;
border-bottom:1px solid #334155;
}

tr:hover{
background:rgba(255,255,255,0.03);
}

.action-buttons{
display:flex;
gap:8px;
flex-wrap:wrap;
}

.btn{
border:none;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
font-size:14px;
}

.view-btn{
background:#3b82f6;
color:white;
}

.reset-btn{
background:#f59e0b;
color:white;
}

.delete-btn{
background:#ef4444;
color:white;
}

@media(max-width:768px){

.page-title{
font-size:22px;
}

th,td{
font-size:13px;
padding:10px;
}

.btn{
font-size:12px;
padding:6px 10px;
}
}
</style>

</head>
<body>

<h1 class="page-title">Users Management</h1>

<div class="top-bar">
<div class="search-box">
<input
type="text"
id="searchInput"
placeholder="Search College Name or Username">
</div>
</div>

<div class="table-container">

<table>

<thead>
<tr>
<th>College Name</th>
<th>Username</th>
<th>Role</th>
<th>Registration Date</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="usersTableBody">

</tbody>

</table>

</div>

<script>

const usersTableBody =
document.getElementById('usersTableBody');

const searchInput =
document.getElementById('searchInput');

let users = [];

async function loadUsers(){

try{

const response =
await fetch('/admin/users/data');

users = await response.json();

renderUsers(users);

}catch(error){

console.error(error);

}

}

function renderUsers(data){

usersTableBody.innerHTML='';

data.forEach(user=>{

const row=document.createElement('tr');

row.innerHTML=`
<td>${user.collegeName || '-'}</td>
<td>${user.username}</td>
<td>${user.role}</td>
<td>${new Date(user.createdAt).toLocaleDateString()}</td>

<td>

<div class="action-buttons">

<button
class="btn view-btn"
onclick="viewUser('${user._id}')">
View
</button>

<button
class="btn reset-btn"
onclick="resetPassword('${user._id}')">
Reset Password
</button>

<button
class="btn delete-btn"
onclick="deleteUser('${user._id}')">
Delete
</button>

</div>

</td>
`;

usersTableBody.appendChild(row);

});

}

searchInput.addEventListener('input',()=>{

const value =
searchInput.value.toLowerCase();

const filtered =
users.filter(user=>

(user.collegeName || '')
.toLowerCase()
.includes(value)

||

user.username
.toLowerCase()
.includes(value)

);

renderUsers(filtered);

});

function viewUser(id){

window.location.href=
`/admin/user/${id}`;

}

async function resetPassword(id){

if(!confirm('Reset password?'))
return;

try{

const response =
await fetch(`/admin/users/reset/${id}`,{
method:'PUT'
});

const result =
await response.json();

alert(result.message);

}catch(error){

alert('Failed');

}

}

async function deleteUser(id){

const confirmDelete =
confirm(
'Are you sure you want to delete this user?'
);

if(!confirmDelete)
return;

try{

const response =
await fetch(`/admin/users/${id}`,{
method:'DELETE'
});

const result =
await response.json();

alert(result.message);

loadUsers();

}catch(error){

alert('Delete failed');

}

}

loadUsers();

</script>

</body>
</html>
