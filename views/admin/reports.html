<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Reports</title>
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/dashboard.css" />
    <link rel="stylesheet" href="/css/responsive.css" />
    <link rel="icon" href="public/images/logo.png" type="image/png">
  </head>
  <body>
    <div class="container">
      <nav>
        <div class="site-brand"><img src="/images/logo.png" alt="Logo" class="brand-logo" /><span>Symposium</span> Admin</div>
        <div class="toggle-menu">☰</div>
        <div class="nav-links">
          <a href="/admin/dashboard">Dashboard</a>
          <a href="/admin/add-event">Add Event</a>
          <a href="/admin/registrations">Registrations</a>
          <a href="/admin/reports">Reports</a>
          <button class="btn btn-secondary" data-logout>Logout</button>
        </div>
      </nav>
      <section class="card" style="max-width:720px; margin:auto;">
        <div class="card-header" style="justify-content:space-between; gap:1rem;">
          <div>
            <h2>Export Reports</h2>
            <p class="text-muted">Download registrations as Excel or individual PDF slips.</p>
          </div>
        </div>
        <div style="display:grid; gap:1rem;">
          <button class="btn btn-primary" onclick="window.location.href='/api/reports/excel'">Download All Registrations (.xlsx)</button>
          <div class="card" style="padding:1.25rem;">
            <h3>Download single registration PDF</h3>
            <p class="text-muted">Enter registration ID and download a PDF slip.</p>
            <div class="form-group">
              <label for="pdfRegistrationId">Registration ID</label>
              <input id="pdfRegistrationId" type="text" placeholder="REG165794..." />
            </div>
            <button class="btn btn-success" id="downloadPdf">Download PDF</button>
          </div>
        </div>
      </section>
    </div>
    <script src="/js/app.js"></script>
    <script>
      document.querySelector('#downloadPdf').addEventListener('click', () => {
        const id = document.querySelector('#pdfRegistrationId').value.trim();
        if (!id) return alert('Enter registration ID');
        window.location.href = `/api/reports/pdf/${encodeURIComponent(id)}`;
      });
    </script>
  </body>
</html>
