<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Registrations</title>
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/dashboard.css" />
    <link rel="stylesheet" href="/css/responsive.css" />
    <link rel="icon" href="public/images/logo.png" type="image/png">
  </head>
  <body>
    <div class="container">
      <nav>
        <div class="site-brand"><img src="/images/logo.png" alt="Logo" class="brand-logo" /><span>Symposium</span> Admin</div>
        <div class="toggle-menu">☰</div>
        <div class="nav-links">
          <a href="/admin/dashboard">Dashboard</a>
          <a href="/admin/add-event">Add Event</a>
          <a href="/admin/registrations">Registrations</a>
          <a href="/admin/reports">Reports</a>
          <button class="btn btn-secondary" data-logout>Logout</button>
        </div>
      </nav>
      <section class="card">
        <div class="card-header" style="justify-content:space-between; gap:1rem;">
          <div>
            <h2>Registration Management</h2>
            <p class="text-muted">View and manage all college registrations.</p>
          </div>
          <div>
            <input id="registrationSearch" type="search" placeholder="Search registrations" />
            <button class="btn btn-primary" id="downloadExcel">Download Excel</button>
          </div>
        </div>
        <div class="table-responsive">
          <table>
            <thead>
              <tr>
                <th>College ID</th>
                <th>Event Name</th>
                <th>College Name</th>
                <th>Department</th>
                <th>Staff Name</th>
                <th>Phone</th>
                <th>District</th>
                <th>Registration Date</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="registrationBody"></tbody>
          </table>
        </div>
      </section>
    </div>
    <script src="/js/app.js"></script>
    <script src="/js/dashboard.js"></script>
  </body>
</html>
