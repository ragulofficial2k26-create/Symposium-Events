<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/dashboard.css" />
    <link rel="stylesheet" href="/css/responsive.css" />
    <link rel="icon" href="public/images/logo.png" type="image/png">
  </head>
  <body>
    <div class="container">
      <nav>
        <div class="site-brand"><img src="/images/logo.png" alt="Logo" class="brand-logo" /><span>Symposium</span> Admin</div>
        <div class="toggle-menu">☰</div>
        <div class="nav-links">
          <a href="/admin/dashboard">Dashboard</a>
          <a href="/admin/add-event">Add Event</a>
          <a href="/admin/registrations">Registrations</a>
          <a href="/admin/reports">Reports</a>
          <button class="btn btn-secondary" data-logout>Logout</button>
        </div>
      </nav>
      <section class="dashboard-panel">
        <div class="dashboard-grid">
          <div class="card stat-card">
            <h3>Total Events</h3>
            <strong id="totalEvents">0</strong>
          </div>
          <div class="card stat-card">
            <h3>Total Registered Colleges</h3>
            <strong id="totalColleges">0</strong>
          </div>
          <div class="card stat-card">
            <h3>Total Participants</h3>
            <strong id="totalParticipants">0</strong>
          </div>
          <div class="card stat-card">
            <h3>Active Events</h3>
            <strong id="activeEvents">0</strong>
          </div>
          <div class="card stat-card">
            <h3>Closed Events</h3>
            <strong id="closedEvents">0</strong>
          </div>
        </div>
      </section>
      <section class="card" style="margin-top:1.5rem;">
        <div class="card-header">
          <div>
            <h2>Manage Events</h2>
            <p class="text-muted">Search, edit, or delete events from the system.</p>
          </div>
        </div>
        <div class="filters">
          <input id="eventSearch" type="search" placeholder="Search events" />
          <select id="filterStatus">
            <option value="">All statuses</option>
            <option value="open">Open</option>
            <option value="upcoming">Upcoming</option>
            <option value="closed">Closed</option>
          </select>
        </div>
        <div id="adminEventList" class="event-list"></div>
      </section>
    </div>
    <div class="toast-container"></div>
    <script src="/js/app.js"></script>
    <script src="/js/dashboard.js"></script>
  </body>
</html>
