<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Event Details</title>
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/cards.css" />
    <link rel="stylesheet" href="/css/forms.css" />
    <link rel="stylesheet" href="/css/responsive.css" />
    <link rel="icon" href="public/images/logo.png" type="image/png">
  </head>
  <body>
    <div class="container">
      <nav>
        <div class="site-brand"><img src="/images/logo.png" alt="Logo" class="brand-logo" /><span>Symposium</span> Details</div>
        <div class="toggle-menu">☰</div>
        <div class="nav-links">
          <a href="/events">Events</a>
          <a href="/my-registrations">My Registrations</a>
          <a href="/profile">Profile</a>
          <button class="btn btn-secondary" data-logout>Logout</button>
        </div>
      </nav>
      <div class="card" style="display:grid; gap:1.5rem;">
        <div class="details-panel"></div>
        <div class="card" style="padding:1.5rem;">
          <div style="display:grid; gap:1rem; align-items:center; grid-template-columns: auto 1fr;">
            <img id="eventPoster" src="/images/default-poster.svg" alt="Poster" style="width:140px; border-radius:18px; height:120px; object-fit:cover;">
            <div>
              <h3 id="eventTitle">Loading event...</h3>
            </div>
          </div>
        </div>
        <div class="card" id="registrationWizard" style="display:grid; gap:1.5rem;">
          <div class="step-header">
            <span class="step-pill active" data-step="1">1. College Information</span>
            <span class="step-pill" data-step="2">2. Competition Entries</span>
          </div>
          <div class="form-step active" data-step="1">
            <div class="form-group">
              <label for="collegeName">College Name</label>
              <input id="collegeName" type="text" placeholder="Your college name" />
            </div>
            <div class="form-group">
              <label for="department">Department</label>
              <input id="department" type="text" placeholder="Department name" />
            </div>
            <div class="form-group">
              <label for="staffName">Staff Name</label>
              <input id="staffName" type="text" placeholder="Coordinator or staff name" />
            </div>
            <div class="form-group">
              <label for="staffPhone">Staff Phone Number</label>
              <input id="staffPhone" type="tel" placeholder="Phone number" />
            </div>
            <div class="form-group">
              <label for="district">District</label>
              <input id="district" type="text" placeholder="College district" />
            </div>
          </div>
          <div class="form-step" data-step="2">
            <div id="competitionFields"></div>
          </div>
          <div class="form-footer">
            <button id="backStep" class="btn btn-secondary" type="button">Back</button>
            <button id="nextStep" class="btn btn-primary" type="button">Next</button>
            <button id="submitRegistration" class="btn btn-success" type="button">Submit Registration</button>
          </div>
        </div>
        <section class="card">
          <h3>Event Competitions</h3>
          <div id="eventMeta"></div>
        </section>
      </div>
    </div>
    <div class="toast-container"></div>
    <script src="/js/app.js"></script>
    <script src="/js/event.js"></script>
    <script src="/js/registration.js"></script>
    <script src="/js/countdown.js"></script>
  </body>
</html>
